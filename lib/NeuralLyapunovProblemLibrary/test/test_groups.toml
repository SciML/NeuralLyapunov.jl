# NeuralLyapunovProblemLibrary supports julia >= 1.11, so the default
# Core-on-[lts,1.11,1,pre] matrix does not apply (lts is 1.10). The functional
# problem-model tests are split into the Pendula and Quadrotors groups; QA runs
# separately. runtests.jl reads NEURALLYAPUNOV_TEST_GROUP and additionally
# accepts the "Core" alias (= Pendula + Quadrotors) for the downgrade workflow.
[Pendula]
versions = ["1.11", "1"]

[Quadrotors]
versions = ["1.11", "1"]

[QA]
versions = ["1"]
