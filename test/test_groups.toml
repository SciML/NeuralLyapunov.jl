# NeuralLyapunov supports julia >= 1.11, so the canonical lts (1.10) entry is
# replaced by 1.11 throughout. Base groups run in the main test env and are part
# of the `All` run; QA, Doctests, and GPU carry their own test/<group>/Project.toml
# and run only when selected (excluded from `All`).
[Core]
versions = ["1.11", "1", "pre"]

[Policy_search]
versions = ["1.11", "1", "pre"]

[ROA]
versions = ["1.11", "1", "pre"]

[Local_lyapunov]
versions = ["1.11", "1", "pre"]

[Benchmarking]
versions = ["1.11", "1", "pre"]

[Unimplemented]
versions = ["1.11", "1", "pre"]

[Doctests]
versions = ["1.11", "1"]

[QA]
versions = ["1.11", "1"]

[GPU]
versions = ["1"]
runner = ["self-hosted", "Linux", "X64", "gpu"]
timeout = 60
