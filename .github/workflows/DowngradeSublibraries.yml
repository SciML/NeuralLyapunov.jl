name: Downgrade Sublibraries

on:
  push:
    branches:
      - master
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  downgrade-sublibraries:
    uses: "SciML/.github/.github/workflows/sublibrary-downgrade.yml@v1"
    with:
      julia-version: "1.11"
      # Every lib/* sublibrary is downgrade-tested (projects auto-discovered, no exclusions).
      skip: "Pkg,TOML,Statistics,LinearAlgebra,SparseArrays,InteractiveUtils,Random,Test"
      group-env-name: "NEURALLYAPUNOV_TEST_GROUP"
      group-env-value: "Core"
    secrets: "inherit"
