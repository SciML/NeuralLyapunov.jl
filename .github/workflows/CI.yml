name: CI

on:
  push:
    branches:
      - master
    tags: ['*']
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: NeuralLyapunov
    concurrency:
      # Skip intermediate builds: always.
      # Cancel intermediate builds: only if it is a pull request build.
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.project }}-${{matrix.group}}
      cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
    strategy:
      fail-fast: false
      matrix:
        version:
          # NeuralLyapunov supports julia >= 1.11; lts (1.10) is intentionally
          # omitted until it is supported.
          - '1.11'
          - '1'
          - 'pre'
        group:
          - 'Core'
          - 'Policy_search'
          - 'ROA'
          - 'Local_lyapunov'
          - 'Benchmarking'
          - 'Unimplemented'
        include:
          - project: '.'
            os: ubuntu-latest
            arch: x64
            allow_failure: false
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      julia-version: "${{ matrix.version }}"
      project: "${{ matrix.project }}"
      group: ${{ matrix.group }}
    secrets: "inherit"

  # GPU tests are a dep-adding group (test/gpu/Project.toml) that runs on the
  # self-hosted GPU runner. Folded in from the former bespoke GPU.yml.
  gpu:
    name: "GPU Tests"
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      julia-version: "1"
      project: "."
      group: "GPU"
      runner: '["self-hosted", "Linux", "X64", "gpu"]'
      timeout-minutes: 360
    secrets: "inherit"
  # lib/NeuralLyapunovProblemLibrary is tested by SublibraryCI.yml (project model),
  # so it is intentionally not duplicated as a root CI matrix job.
