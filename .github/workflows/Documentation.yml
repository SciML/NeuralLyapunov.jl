name: "Documentation"

on:
  push:
    branches:
      - master
    tags: '*'
  pull_request:
  workflow_dispatch:

# Doctests are run as a test group: the root package's Doctests group is part of
# the CI.yml matrix (on its declared [1.11, 1] versions), and the sublibrary's
# Doctests group runs via SublibraryCI.yml. This workflow only builds/deploys docs.
jobs:
  build:
    name: Build
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build
      cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch || github.ref != 'refs/tags/v*' }}
    uses: "SciML/.github/.github/workflows/documentation.yml@v1"
    with:
      debug-documenter: true
    secrets: "inherit"
